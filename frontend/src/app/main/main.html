<app-nav></app-nav>
<body>

    <section class="py-5 min-vh-100 d-flex flex-column justify-content-center position-relative">
        <div class="container text-center mb-5">
            <h1 class="brand-title display-4 mb-2">SLEEP DEPRIVED</h1>
            <p class="brand-subtitle lead">We lack sleep but not creativity</p>
        </div>

        <div class="container my-auto">
            <div class="row align-items-center justify-content-center g-4">
                <div class="col-md-5 text-center text-md-end">
                    <div class="pe-md-4">
                        <h5 class="text-yellow mb-1">Projects</h5>
                        <h2 class="game-logo-text display-5 bg-light px-3 py-2 rounded shadow align-content:center">Boardgame<br>Madness</h2>
                    </div>
                </div>
                
                <div class="col-md-5 text-center text-md-start">
                    <div class="ps-md-4">
                        <p class="text-yellow mb-1">Currently in Development</p>
                        <p class="text-yellow fw-light mb-3">Short info about the game</p>
                        <a (click)="goTo()" class="btn btn-sm px-4 rounded-pill text-white" style="background-color: #a855f7;">More info</a>
                    </div>
                </div>
            </div>
        </div>

    </section>

    <section class="py-5 min-vh-100 d-flex flex-column justify-content-center">
        <div class="container mb-5">
            <div class="row justify-content-center text-center">
                <div class="col-md-6">
                    <h2 class="section-heading mb-3">About the team</h2>
                    <p class="text-yellow mb-0">Blah blah blah blah ..</p>
                    <p class="text-yellow mb-0">Blah blah blah blah</p>
                    <p class="text-yellow mb-0">blahblahbdweb</p>
                </div>
            </div>
        </div>

        <div class="container">
            <div class="row justify-content-center g-4">
                @for ( member of teamMembers; track member.name){
                <div class="col-6 col-md-2 text-center" (click)="goToProfile(member.route)" style="cursor: pointer;">
              <img 
                        [src]="member.image" 
                        [alt]="member.name"
                        class="rounded img-fluid shadow-sm"
                        style="width: 200px; height: 200px; object-fit: cover; border: 2px solid #000000;"
                    />
                    <p class="text-yellow fw-bold mt-2">{{ member.name }}</p>
            </div>
        }
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
