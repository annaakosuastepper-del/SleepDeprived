<app-nav></app-nav>

<div class="container-fluid" style="background-color: palevioletred;">
    
    <div class="row">
        <div class="col-12"> <div class="profile-name">  Name </div> </div>
     </div>
    
    <div class="row g-3 mt-2 px-3">
        <div class="col-md-4">
            <div class="profile-pic">Picture</div></div> 
            
            <div class="col-md-8">
                <div class="profile-bio">Bio
                    <div class="col-12"> <div class="text-box"> {{profile?.bio}} </div></div>
                </div>
             </div>
    </div>

    <div class="row g-3 mt-2 px-3"> 

       <div class="col-md-8">
        <div class="profile-role"> Role 
            <div class="col-12"> <div class="text-box"> {{profile?.role}} </div></div>
        </div></div> 
       <div class="col-md-4"> <div class="pixel-me"> Pixel me </div></div> 
    </div>

    <div class="row g-3 mt-2 px-3">
        <div class="col-12"> <div class="cv"><h1>Resume </h1> </div></div> 
            
                @for (box of profile?.boxes; track box){
                <div class="col-md-4">
                 <div class="box"> {{box.title}} 
                    <div class="row g-2 mt-1">
                         <div class="col-12"> <div class="text-box"> {{ box.content }} </div></div>
                    </div>
                    </div>
                </div>
                }
    </div>
            
            
            <div class="col-md-4" >
                <div class="box6"> Box 6 
                    
                <div class="row g-2 mt-1">
                    @for (file of profile?.files; track file){
                    <div class="col-4"><div class="file1"> {{file}}</div></div>
                  }
                </div>

                </div>
             </div>
    </div>

      <div class="col-12"> <div class="cv">button </div></div> 
      
<app-footer></app-footer>
